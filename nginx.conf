server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Arquivos estáticos com cache agressivo
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|otf)$ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # SPA fallback para React Router
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Compressão
  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml+rss application/xml application/vnd.ms-fontobject image/svg+xml;
  gzip_min_length 1024;
}

